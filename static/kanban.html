<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kanban Board — Lama Caravan</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/topology-board.css">
  <link rel="stylesheet" href="/css/canvas.css">
  <link rel="stylesheet" href="/css/modals.css">
  <link rel="stylesheet" href="/css/cards.css">
  <link rel="stylesheet" href="/css/form.css">
  <link rel="stylesheet" href="/css/monitor.css">
  <link rel="stylesheet" href="/css/nodes.css">
  <link rel="stylesheet" href="/css/hf.css">
  <link rel="stylesheet" href="/css/onboarding.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100dvh; overflow: hidden; }
    body {
      display: flex;
      flex-direction: column;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui, system-ui, sans-serif);
      font-size: 13px;
    }

    /* ── standalone kanban header ── */
    .rw-head-standalone {
      background: var(--surface);
      padding: 10px 18px !important;
      gap: 14px !important;
      border-radius: 0 !important;
    }
    .rw-back-link {
      color: var(--muted);
      text-decoration: none;
      font-size: 12px;
      white-space: nowrap;
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid var(--border, var(--line));
      flex-shrink: 0;
    }
    .rw-back-link:hover { color: var(--text); }
    .rw-head-title-group { display: flex; flex-direction: column; gap: 5px; }
    .rw-head-name { font-weight: 700; font-size: 15px; white-space: nowrap; }
    .rw-head-badges { display: flex; flex-wrap: wrap; align-items: center; gap: 5px; }
    .rw-stat-badge { font-size: 11px !important; min-height: 18px !important; padding: 1px 7px !important; font-weight: 500 !important; }
    .rw-stat-badge strong { font-weight: 700; margin-left: 3px; }
    .rw-default-chip {
      font-size: 11px !important; min-height: 18px !important; padding: 1px 8px !important;
      background: color-mix(in srgb, var(--accent) 12%, var(--panel)) !important;
      border-color: color-mix(in srgb, var(--accent) 30%, var(--line)) !important;
      color: var(--accent) !important; font-weight: 500 !important;
    }

    /* ── mount area fills remaining viewport ── */
    #topologyProxies {
      flex: 1 1 auto;
      min-height: 0;
      position: relative;
    }

    /* Router workspace overlay: position relative to the container, no dim bg */
    #topologyProxies .router-workspace-overlay {
      position: absolute !important;
      background: none !important;
      backdrop-filter: none !important;
      padding: 0 !important;
    }
    #topologyProxies .router-workspace {
      width: 100% !important;
      height: 100% !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      border: none !important;
    }
  </style>
</head>

    <div class="pl-hint">loading…</div>
    <script>
      (() => {
        const l = document.getElementById("appLoader");
        // подпись — на языке сохранённого интерфейса (по умолчанию английский)
        const lang = (localStorage.getItem("llamacppAdminLang") || "en").toLowerCase();
        const hints = { en: "loading…", ru: "загружается…", zh: "加载中…", es: "cargando…",
          fr: "chargement…", de: "lädt…", ja: "読み込み中…", pt: "carregando…", it: "caricamento…",
          ko: "로딩 중…", tr: "yükleniyor…", vi: "đang tải…" };
        l.querySelector(".pl-hint").textContent = hints[lang] || hints.en;
        // случайный караван: форма груза × цвет тела × попона × цвет груза —
        // формы задают пиксельную сетку (.pl-s1..s4), цвета миксуются переменными;
        // с шансом 1/10 одно место в караване занимает черепашка
        const BODIES = ["#d9c29a", "#e8e2d4", "#a97e4f", "#b9b3a7", "#8a6f52", "#cbb188"];
        const BLANKETS = ["#43b3a4", "#d98c4a", "#9a7bd0", "#c4574e", "#4f8fd0", "#c9a83b", null];
        const CARGOS = ["#6e5137", "#8a7351", "#5d6657", "#7a4a41"];
        const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];
        const walkers = l.querySelectorAll(".pl-llama");
        const turtleAt = Math.random() < 0.1 ? Math.floor(Math.random() * walkers.length) : -1;
        walkers.forEach((el, i) => {
          if (i === turtleAt) {
            el.classList.add("pl-t");
            if (Math.random() < 0.5) el.classList.add("pl-t-hop");
            return;
          }
          el.classList.add("pl-s" + (1 + Math.floor(Math.random() * 4)));
          const body = pick(BODIES);
          el.style.setProperty("--pl-body", body);
          const blanket = pick(BLANKETS);
          el.style.setProperty("--pl-blanket", blanket || body);
          el.style.setProperty("--pl-cargo", pick(CARGOS));
          el.style.setProperty("--pl-rope", "#c8a06c");
        });
        // 2-кадровая походка
        const gait = setInterval(() => l && l.querySelectorAll(".pl-llama").forEach(el => el.classList.toggle("pl-gaitb")), 220);
        window.__plHide = () => { if (!l || l.classList.contains("pl-done")) return; l.classList.add("pl-done");
          setTimeout(() => { clearInterval(gait); l.remove(); }, 400); };
        setTimeout(window.__plHide, 20000);  // страховка, если инициализация зависла
      })();
    </script>
