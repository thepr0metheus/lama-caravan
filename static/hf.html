<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HF Browser — Lama Caravan</title>
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/topology-board.css">
  <link rel="stylesheet" href="/css/canvas.css">
  <link rel="stylesheet" href="/css/modals.css">
  <link rel="stylesheet" href="/css/cards.css">
  <link rel="stylesheet" href="/css/form.css">
  <link rel="stylesheet" href="/css/monitor.css">
  <link rel="stylesheet" href="/css/nodes.css">
  <link rel="stylesheet" href="/css/hf.css">
  <link rel="stylesheet" href="/css/onboarding.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

    body {
      height: 100dvh;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui, system-ui, sans-serif);
      font-size: 13px;
    }

    /* ── header ── */
    .hf-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 18px;
      border-bottom: 1px solid var(--line);
      background: var(--surface);
    }
    .hf-back-link {
      color: var(--muted);
      text-decoration: none;
      font-size: 12px;
      white-space: nowrap;
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid var(--border, var(--line));
    }
    .hf-back-link:hover { color: var(--text); }
    .hf-page-title { font-weight: 700; font-size: 14px; white-space: nowrap; }
    .hf-header .hf-token-row {
      margin-left: auto;
      border: 1px solid var(--line);
      border-radius: 5px;
      background: var(--field);
      padding: 4px 10px;
      font-size: 12px;
    }

    /* ── search ── */
    .hf-search {
      display: flex;
      gap: 10px;
      padding: 10px 18px;
      border-bottom: 1px solid var(--line);
      background: var(--surface);
    }
    .hf-search input {
      flex: 1;
      padding: 7px 12px;
      border-radius: 6px;
      border: 1px solid var(--border, var(--line));
      background: var(--field);
      color: var(--text);
      font-size: 13px;
      outline: none;
    }
    .hf-search input:focus { border-color: var(--accent); }
    .hf-search button {
      padding: 7px 22px;
      border-radius: 6px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    .hf-search button:hover { opacity: .85; }
    .hf-search button:disabled { opacity: .45; cursor: default; }
    .hf-search select {
      flex-shrink: 0;
      width: auto;
      padding: 7px 10px;
      border-radius: 6px;
      border: 1px solid var(--border, var(--line));
      background: var(--field);
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      outline: none;
    }

    /* ── split ── */
    .hf-split {
      display: grid;
      grid-template-columns: 1fr 2fr;
      min-height: 0;
      overflow: hidden;
    }

    /* ── left: repo list ── */
    .hf-repo-col {
      border-right: 1px solid var(--line);
      overflow-y: auto;
      overscroll-behavior: contain;
    }
    .hf-section-label {
      padding: 6px 14px 4px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
    }
    .hf-fav-toggle {
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      user-select: none;
      padding-right: 12px;
    }
    .hf-fav-toggle:hover { color: var(--text); }
    .hf-fav-chevron { font-size: 8px; opacity: 0.6; }
    .hf-section-divider {
      height: 1px;
      background: var(--line);
      margin: 4px 0;
    }
    .hf-results-list { display: flex; flex-direction: column; }

    .hf-repo-row {
      display: flex;
      flex-direction: column;
      gap: 3px;
      padding: 8px 12px 8px 14px;
      border-bottom: 1px solid var(--line);
      cursor: pointer;
      user-select: none;
    }
    .hf-repo-row:hover { background: color-mix(in srgb, var(--accent) 7%, var(--bg)); }
    .hf-repo-row.is-active {
      background: color-mix(in srgb, var(--accent) 12%, var(--bg));
      border-left: 3px solid var(--accent);
      padding-left: 11px;
    }
    .hf-repo-row-top {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }
    .hf-repo-row-id {
      flex: 1;
      min-width: 0;
      font-weight: 600;
      font-size: 13px;
      font-family: monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .hf-star-btn {
      flex-shrink: 0;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      color: var(--muted);
      padding: 0 2px;
      line-height: 1;
    }
    .hf-star-btn:hover, .hf-star-btn.is-starred { color: #f5a623; }
    .hf-repo-row-bottom {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .hf-repo-row-meta {
      font-size: 11px;
      color: var(--muted);
      flex-shrink: 0;
    }
    .hf-repo-params {
      color: var(--accent);
      font-weight: 600;
    }
    .hf-repo-badges {
      display: flex;
      gap: 3px;
      flex-wrap: wrap;
    }

    /* ── right: file panel ── */
    .hf-file-col {
      overflow-y: auto;
      overscroll-behavior: contain;
      display: flex;
      flex-direction: column;
    }
    .hf-file-col-header {
      position: sticky;
      top: 0;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
    }
    .hf-file-col-title {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 600;
      font-size: 13px;
      font-family: monospace;
      color: var(--text);
    }
    .hf-file.is-low-quant { opacity: 0.38; }
    .hf-file.is-low-quant:hover { opacity: 0.75; }
    .hf-file-empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 13px;
    }
    /* file list lives inside file-col, reuse existing .hf-file* styles */
    .hf-file-col .hf-file-list { padding: 8px 12px; gap: 3px; }
    .hf-file-col .hf-file-name { flex: 1; min-width: 0; }

    /* local file indicator */
    .hf-file.is-local {
      background: color-mix(in srgb, #4ade80 8%, transparent);
      border-radius: 4px;
    }
    .hf-file-local {
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 700;
      color: #4ade80;
    }

    .hf-repo-date {
      opacity: 0.75;
    }
    .hf-repo-last-modified {
      flex-shrink: 0;
      font-size: 11px;
      color: var(--muted);
      font-style: italic;
    }

    /* ── benchmark inline chips ── */
    .hf-bench-inline {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      padding: 2px 0 0;
    }
    .hf-bench-chip {
      display: flex;
      align-items: center;
      gap: 3px;
      padding: 1px 6px;
      border-radius: 4px;
      background: color-mix(in srgb, var(--accent) 10%, var(--bg));
      border: 1px solid color-mix(in srgb, var(--accent) 25%, transparent);
      font-size: 10.5px;
      white-space: nowrap;
    }
    .hf-bench-chip-name {
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .03em;
      font-size: 9.5px;
    }
    .hf-bench-chip-val {
      color: var(--text);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }
    .hf-bench-chip.is-elo {
      background: color-mix(in srgb, #f5a623 10%, var(--bg));
      border-color: color-mix(in srgb, #f5a623 30%, transparent);
    }
    .hf-bench-chip.is-elo .hf-bench-chip-name { color: #c8850a; }

    /* ── benchmark toggle button ── */
    .hf-bench-toggle {
      flex-shrink: 0;
      background: none;
      border: 1px solid var(--line);
      border-radius: 4px;
      color: var(--muted);
      font-size: 10px;
      padding: 1px 5px;
      cursor: pointer;
      line-height: 1.5;
      white-space: nowrap;
    }
    .hf-bench-toggle:hover { color: var(--text); border-color: var(--muted); }
    .hf-bench-toggle.is-active { color: var(--accent); border-color: var(--accent); }

    /* ── benchmark expandable panel ── */
    .hf-bench-panel {
      margin: 4px 0 2px;
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: hidden;
      background: color-mix(in srgb, var(--surface) 60%, var(--bg));
    }
    .hf-bench-loading {
      padding: 8px 12px;
      font-size: 11px;
      color: var(--muted);
    }
    .hf-bench-group {
      border-bottom: 1px solid var(--line);
    }
    .hf-bench-group:last-child { border-bottom: none; }
    .hf-bench-group-label {
      padding: 5px 10px 3px;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--muted);
      background: color-mix(in srgb, var(--surface) 80%, transparent);
    }
    .hf-bench-row {
      display: grid;
      grid-template-columns: 100px 1fr 52px 60px;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-top: 1px solid color-mix(in srgb, var(--line) 50%, transparent);
    }
    .hf-bench-row:first-of-type { border-top: none; }
    .hf-bench-row-name {
      font-size: 11px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .hf-bench-row-desc {
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .hf-bench-bar-wrap {
      height: 5px;
      background: color-mix(in srgb, var(--muted) 20%, transparent);
      border-radius: 3px;
      overflow: hidden;
    }
    .hf-bench-bar-fill {
      height: 100%;
      border-radius: 3px;
      background: var(--accent);
      transition: width .3s ease;
    }
    .hf-bench-row-val {
      font-size: 11px;
      font-weight: 700;
      color: var(--text);
      font-variant-numeric: tabular-nums;
      text-align: right;
      white-space: nowrap;
    }
    .hf-bench-row-scale {
      font-size: 9.5px;
      color: var(--muted);
      text-align: right;
      white-space: nowrap;
    }
    /* Elo row gets gold accent */
    .hf-bench-row.is-elo .hf-bench-bar-fill { background: #f5a623; }
    .hf-bench-row.is-elo .hf-bench-row-val  { color: #c8850a; }

    /* Benchmark name link */
    .hf-bench-row-name a {
      color: inherit;
      text-decoration: none;
    }
    .hf-bench-row-name a:hover { text-decoration: underline; color: var(--accent); }

    /* Panel header: data-from note + refresh btn */
    .hf-bench-panel-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 10px;
      border-bottom: 1px solid var(--line);
      background: color-mix(in srgb, var(--surface) 90%, transparent);
    }
    .hf-bench-data-from {
      flex: 1;
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .hf-bench-data-from strong { color: var(--text); font-weight: 600; }
    .hf-bench-refresh {
      flex-shrink: 0;
      background: none;
      border: 1px solid var(--line);
      border-radius: 4px;
      color: var(--muted);
      font-size: 11px;
      padding: 1px 6px;
      cursor: pointer;
      white-space: nowrap;
    }
    .hf-bench-refresh:hover { color: var(--text); border-color: var(--muted); }
    .hf-bench-from-cache {
      font-size: 9px;
      color: var(--muted);
      opacity: 0.7;
    }

    /* recommendation highlight */
    .hf-file.is-recommended {
      background: color-mix(in srgb, #fb923c 10%, transparent);
      border-radius: 4px;
    }
    .hf-file-rec {
      flex-shrink: 0;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: #fb923c;
      padding: 1px 5px;
      border: 1px solid color-mix(in srgb, #fb923c 45%, transparent);
      border-radius: 3px;
    }

    /* ── filter bar ── */
    .hf-filter-bar {
      flex-shrink: 0;
      padding: 6px 10px 4px;
      border-bottom: 1px solid var(--line);
      background: var(--bg);
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .hf-filter-row {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-wrap: wrap;
    }
    .hf-filter-label {
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .hf-chips { display: flex; gap: 3px; flex-wrap: wrap; }
    .hf-chip {
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: none;
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
    }
    .hf-chip:hover { border-color: var(--accent); color: var(--accent); }
    .hf-chip.is-active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .hf-mask-input {
      flex: 1;
      min-width: 80px;
      background: var(--field);
      border: 1px solid var(--line);
      border-radius: 4px;
      color: var(--text);
      font-size: 11px;
      padding: 3px 7px;
      outline: none;
    }
    .hf-mask-input:focus { border-color: var(--accent); }
    .hf-sort-select {
      background: var(--field);
      border: 1px solid var(--line);
      border-radius: 4px;
      color: var(--text);
      font-size: 11px;
      padding: 3px 6px;
      cursor: pointer;
      outline: none;
    }
    .hf-load-progress {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 2px 0;
    }
    .hf-load-bar-track {
      flex: 1;
      height: 3px;
      background: var(--line);
      border-radius: 2px;
      overflow: hidden;
    }
    .hf-load-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width .2s;
      width: 0%;
    }
    .hf-load-text { font-size: 10px; color: var(--muted); white-space: nowrap; }

    /* ── section headers ── */
    .hf-section-header {
      position: sticky;
      top: 0;
      z-index: 2;
      padding: 5px 12px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: default;
    }
    .hf-fav-header {
      background: color-mix(in srgb, var(--accent) 18%, var(--bg));
      color: var(--accent);
      border-bottom: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
      cursor: pointer;
      user-select: none;
    }
    .hf-fav-header .hf-fav-chevron { cursor: pointer; font-size: 9px; }
    .hf-results-header {
      background: color-mix(in srgb, var(--fg) 8%, var(--bg));
      color: var(--muted);
      border-bottom: 1px solid var(--line);
    }
    .hf-ref-header {
      background: color-mix(in srgb, #a78bfa 10%, var(--bg));
      color: #c4b5fd;
      border-bottom: 1px solid color-mix(in srgb, #a78bfa 20%, transparent);
      cursor: pointer;
      user-select: none;
    }

    /* ── frontier reference table ── */
    .hf-ref-table {
      padding: 4px 0 2px;
    }
    .hf-ref-row {
      display: grid;
      grid-template-columns: 55px 1fr 55px 28px;
      align-items: center;
      gap: 5px;
      padding: 3px 12px;
      font-size: 11px;
    }
    .hf-ref-row:hover { background: color-mix(in srgb, var(--accent) 5%, transparent); }
    .hf-ref-org {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .03em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .hf-ref-name {
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .hf-ref-bar-wrap {
      height: 6px;
      background: color-mix(in srgb, var(--muted) 15%, transparent);
      border-radius: 3px;
      overflow: hidden;
    }
    .hf-ref-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width .4s ease;
    }
    .hf-ref-val {
      font-size: 11px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--text);
      text-align: right;
    }
    .hf-ref-footer {
      padding: 4px 12px 6px;
      font-size: 10px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .hf-ref-footer a { color: var(--muted); }
    .hf-ref-footer a:hover { color: var(--accent); }

    /* ── download panel ── */
    #hfDownloadPanel {
      border-top: 2px solid var(--accent);
      background: color-mix(in srgb, var(--accent) 5%, var(--panel, var(--bg)));
      flex-shrink: 0;
    }
    .hf-dl-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 18px;
    }
    .hf-dl-bar-label {
      flex: 1;
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .hf-dl-toggle {
      background: none;
      border: 1px solid var(--line);
      border-radius: 4px;
      color: var(--muted);
      font-size: 11px;
      padding: 2px 7px;
      cursor: pointer;
    }
    .hf-dl-toggle:hover { color: var(--text); border-color: var(--muted); }
    .hf-dl-body {
      padding: 0 18px 10px;
    }
    .hf-dl-body .hf-dl-preview {
      max-height: 120px;
      overflow-y: auto;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div id="appLoader" aria-hidden="true">
    <style>
      #appLoader { position: fixed; inset: 0; z-index: 9999; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 26px; background: #11171a;
        transition: opacity .35s ease; image-rendering: pixelated; }
      #appLoader.pl-done { opacity: 0; pointer-events: none; }
      #appLoader .pl-title { color: #e7eef1; font: 800 15px/1 -apple-system, "Segoe UI", sans-serif;
        letter-spacing: .42em; text-indent: .42em; opacity: .85; }
      #appLoader .pl-strip { position: relative; width: min(340px, 78vw); height: 84px; overflow: hidden; }
      #appLoader .pl-strip::after { content: ""; position: absolute; left: 0; right: 0; bottom: 8px;
        height: 2px; background: rgba(160,180,185,.25); }
      #appLoader .pl-llama { position: absolute; bottom: 10px; left: -110px; width: 1em; height: 1em;
        font-size: 5px; animation: pl-walk 7s linear infinite, pl-gait .45s steps(1, end) infinite; }
      #appLoader .pl-llama::before { content: ""; position: absolute; width: 1em; height: 1em;
        transform: translateY(-12em); }
      #appLoader .pl-llama.pl-b { animation-delay: -2.4s, -.15s; font-size: 4.2px; opacity: .9; }
      #appLoader .pl-llama.pl-c { animation-delay: -4.9s, -.3s; font-size: 3.5px; opacity: .8; }

      <span class="pl-llama"></span>

    </div>
    <div class="pl-hint">loading…</div>
    <script>
      (() => {
        const l = document.getElementById("appLoader");
        // подпись — на языке сохранённого интерфейса (по умолчанию английский)
        const lang = (localStorage.getItem("llamacppAdminLang") || "en").toLowerCase();
        const hints = { en: "loading…", ru: "загружается…", zh: "加载中…", es: "cargando…",
          fr: "chargement…", de: "lädt…", ja: "読み込み中…", pt: "carregando…", it: "caricamento…",
          ko: "로딩 중…", tr: "yükleniyor…", vi: "đang tải…" };
        l.querySelector(".pl-hint").textContent = hints[lang] || hints.en;
        // случайный караван: форма груза × цвет тела × попона × цвет груза —
        // формы задают пиксельную сетку (.pl-s1..s4), цвета миксуются переменными;
        // с шансом 1/10 одно место в караване занимает черепашка
        const BODIES = ["#d9c29a", "#e8e2d4", "#a97e4f", "#b9b3a7", "#8a6f52", "#cbb188"];
        const BLANKETS = ["#43b3a4", "#d98c4a", "#9a7bd0", "#c4574e", "#4f8fd0", "#c9a83b", null];
        const CARGOS = ["#6e5137", "#8a7351", "#5d6657", "#7a4a41"];
        const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];
        const walkers = l.querySelectorAll(".pl-llama");
        const turtleAt = Math.random() < 0.1 ? Math.floor(Math.random() * walkers.length) : -1;
        walkers.forEach((el, i) => {
          if (i === turtleAt) {
            el.classList.add("pl-t");
            if (Math.random() < 0.5) el.classList.add("pl-t-hop");
            return;
          }
          el.classList.add("pl-s" + (1 + Math.floor(Math.random() * 4)));
          const body = pick(BODIES);
          el.style.setProperty("--pl-body", body);
          const blanket = pick(BLANKETS);
          el.style.setProperty("--pl-blanket", blanket || body);
          el.style.setProperty("--pl-cargo", pick(CARGOS));
          el.style.setProperty("--pl-rope", "#c8a06c");
        });
        // 2-кадровая походка
        const gait = setInterval(() => l && l.querySelectorAll(".pl-llama").forEach(el => el.classList.toggle("pl-gaitb")), 220);
        window.__plHide = () => { if (!l || l.classList.contains("pl-done")) return; l.classList.add("pl-done");
          setTimeout(() => { clearInterval(gait); l.remove(); }, 400); };
        setTimeout(window.__plHide, 20000);  // страховка, если инициализация зависла
      })();
    </script>
